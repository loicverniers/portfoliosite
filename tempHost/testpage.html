<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Testpage | LVSites</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #070a12;
        color: #f7fbff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 25% 20%, rgba(71, 145, 255, 0.22), transparent 34rem),
          radial-gradient(circle at 75% 70%, rgba(255, 190, 88, 0.16), transparent 28rem),
          #070a12;
      }

      main {
        width: min(92vw, 680px);
        padding: clamp(2rem, 6vw, 4rem);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
        text-align: center;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 1.5rem;
        padding: 0.6rem 1rem;
        border-radius: 999px;
        background: rgba(69, 255, 163, 0.12);
        color: #7dffbd;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.8rem;
      }

      .dot {
        width: 0.7rem;
        height: 0.7rem;
        border-radius: 50%;
        background: #7dffbd;
        box-shadow: 0 0 18px #7dffbd;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 7vw, 4.5rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: rgba(247, 251, 255, 0.74);
        font-size: clamp(1rem, 2.4vw, 1.25rem);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="status"><span class="dot"></span> Werkt</div>
      <h1>Bevestiging van werking</h1>
      <p>Deze testpagina is correct geladen op LVSites.</p>
    </main>
  </body>
</html>
